help=<html><body><h1>L'aide</h1><p>Cliquez sur un titre à gauche pour afficher le contenu du guide.</p></body></html>
quit=<html><body><h1>Quitter</h1><p>Utilisez le menu <b>Fichier > Quitter</b> ou CTRL+Q.</p></body></html>
c2f=<html><body><h1>Celsius -> Farenheit</h1><p>Saisissez la valeur en Celsius et cliquez sur <b>Convertir</b>.</p></body></html>
f2c=<html><body><h1>Farenheit -> Celsius</h1><p>Saisissez la valeur en Farenheit et cliquez sur <b>Convertir</b>.</p></body></html>
bold=<html><body><h1>Gras</h1><p>Cochez la case <b>Gras</b> ou utilisez CTRL+G.</p></body></html>
color=<html><body><h1>Couleur</h1><p>Cochez la case <b>Rouge</b> ou utilisez CTRL+R.</p></body></html>